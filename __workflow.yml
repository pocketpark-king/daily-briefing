name: 每日简报

on:
  schedule:
    - cron: '15 1 * * 1-5'
    - cron: '0 4 * * 0,6'
  workflow_dispatch:

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: 运行简报
        run: python daily_briefing.py